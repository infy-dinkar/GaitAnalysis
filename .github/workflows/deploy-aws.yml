name: Deploy to AWS EC2

on:
  push:
    branches: [clean-deploy, main]
    paths:
      - 'api.py'
      - 'engines/**'
      - 'routes/**'
      - 'models/**'
      - 'utils/**'
      - 'Dockerfile.aws'
      - 'requirements.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/GaitAnalysis
            git pull origin clean-deploy
            sudo docker build -f Dockerfile.aws -t motionlens-api .
            sudo docker stop motionlens-api || true
            sudo docker rm motionlens-api || true
            sudo docker run -d \
              --name motionlens-api \
              -p 8000:8000 \
              --env-file ~/GaitAnalysis/.env \
              --restart always \
              motionlens-api
            echo "Deployed successfully"

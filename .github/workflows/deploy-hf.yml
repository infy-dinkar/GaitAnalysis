# Auto-deploy backend to Hugging Face Spaces on every push to main.
# After this is set up, you NEVER need to push to HF manually — just
# git push to GitHub, and the backend rebuilds on HF within minutes.
#
# One-time setup (see DEPLOYMENT.md for screenshots):
#   1. Create a Write-scope HF token at huggingface.co/settings/tokens
#   2. In your GitHub repo, go to:
#        Settings → Secrets and variables → Actions → New repository secret
#      Add THREE secrets:
#        HF_TOKEN          = (paste the token from step 1)
#        HF_USERNAME       = your Hugging Face username
#        HF_SPACE_NAME     = your Space name (e.g. motionlens-api)

name: Deploy backend to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:    # also allow manual trigger from Actions tab

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history — HF needs this to push correctly
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          # Trim leading/trailing whitespace from each secret. Copy-paste
          # into GitHub's secret form sometimes adds a trailing space or
          # newline that breaks the constructed URL.
          HF_TOKEN=$(echo -n "$HF_TOKEN" | tr -d '[:space:]')
          HF_USERNAME=$(echo -n "$HF_USERNAME" | tr -d '[:space:]')
          HF_SPACE_NAME=$(echo -n "$HF_SPACE_NAME" | tr -d '[:space:]')
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$HF_SPACE_NAME" ]; then
            echo "❌ Missing required GitHub secrets after trimming."
            echo "   Set HF_TOKEN, HF_USERNAME, HF_SPACE_NAME in repo Settings → Secrets."
            exit 1
          fi
          # Diagnostic: print non-secret lengths so we can spot zero-length
          # values without leaking the secret content itself.
          echo "HF_USERNAME length: ${#HF_USERNAME}"
          echo "HF_SPACE_NAME length: ${#HF_SPACE_NAME}"
          echo "HF_TOKEN length: ${#HF_TOKEN}"
          git config --global user.email "actions@github.com"
          git config --global user.name  "GitHub Actions"
          # Quoting the URL prevents word-splitting if a value still has
          # whitespace; the trim above should already have handled it.
          git push --force \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}" \
            HEAD:main
          echo "✅ Pushed to https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}"
